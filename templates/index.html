<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Chollos Amazon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #232f3e;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            margin: 0;
        }

        .filtros {
            text-align: center;
            padding: 15px 0;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filtros button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ffa41c;
            color: #fff;
            font-weight: bold;
            transition: 0.2s;
        }

        .filtros button:hover {
            background: #ff8f00;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            object-fit: contain;
            max-height: 200px;
            background: #f9f9f9;
        }

        .card-content {
            padding: 15px;
            flex-grow: 1;
        }

        .card-content h3 {
            font-size: 16px;
            margin: 0 0 10px;
            height: 40px;
            overflow: hidden;
        }

        .card-content p {
            margin: 0 0 10px;
            font-weight: bold;
            color: #b12704;
        }

        .card-content a {
            background: #ffa41c;
            color: white;
            padding: 10px;
            text-align: center;
            display: block;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .card-content a:hover {
            background: #ff8f00;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🔥 Mejores Ofertas Amazon</h1>
    </div>

    <div class="filtros">
        <button onclick="cargar()">Todas</button>
        <button onclick="cargar('zapatillas')">Zapatillas</button>
        <button onclick="cargar('tecnologia')">Tecnología</button>
        <button onclick="cargar('hogar')">Hogar</button>
    </div>

    <div class="grid" id="productos"></div>

    <script>
        function cargar(categoria="") {
            let url = "https://TU_URL.onrender.com/api/ofertas";
            if(categoria) url += "?categoria=" + categoria;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                let cont = document.getElementById("productos");
                cont.innerHTML = "";

                data.forEach(p => {
                    cont.innerHTML += `
                        <div class="card">
                            <img src="${p.imagen}" alt="${p.nombre}">
                            <div class="card-content">
                                <h3>${p.nombre}</h3>
                                <p>${p.precio}</p>
                                <a href="${p.link}" target="_blank">VER OFERTA</a>
                            </div>
                        </div>
                    `;
                });
            });
        }

        cargar();
    </script>

</body>
</html>
